name: NZAA Departure Watcher

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

jobs:
  departures:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python check_departures.py
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          AIRLABS_KEY: ${{ secrets.AIRLABS_KEY }}

      - name: Save state
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update seen departures
